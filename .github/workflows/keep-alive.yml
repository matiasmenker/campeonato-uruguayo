name: Keep API Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping API health endpoint
        run: |
          curl --fail --silent --show-error --max-time 60 \
            https://api.campeonatouruguayo.com/health
