name: Sync Live

on:
  schedule:
    # Every 5 minutes, 08:00-23:59 UYT (11:00-02:59 UTC)
    # No corre de 02:00 a 08:00 UYT (05:00-11:00 UTC)
    - cron: "*/5 11-23 * * *"
    - cron: "*/5 0-2 * * *"
  workflow_dispatch:

jobs:
  sync-live:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run live sync
        run: pnpm sync:live
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
